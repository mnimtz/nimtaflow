name: PhotoFlow
options:
  bundleIdPrefix: email.nimtz.photoflow
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""        # set your Apple Team ID in Xcode for device builds
targets:
  PhotoFlow:
    type: application
    platform: iOS
    sources:
      - PhotoFlow
    info:
      path: PhotoFlow/Info.plist
      properties:
        CFBundleDisplayName: PhotoFlow
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        # Server runs over HTTP on the LAN → allow non-TLS loads.
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        NSLocationWhenInUseUsageDescription: "Zeigt deine Fotos auf der Karte."
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: email.nimtz.photoflow
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_VERSION: "5.9"
