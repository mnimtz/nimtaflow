server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # API proxy → backend. Use Docker's embedded DNS (127.0.0.11) + a variable
    # so nginx RE-RESOLVES the backend on each request instead of caching the IP
    # at startup — otherwise a backend recreate leaves nginx on a dead IP → 502
    # until a manual frontend restart.
    location /api/ {
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $pf_backend backend;
        proxy_pass http://$pf_backend:8000$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
        client_max_body_size 500m;
    }

    # ── Device Authorization (TV/FireTV/tvOS QR-Login) ──
    # /activate zeigt die standalone HTML-Aktivierungsseite direkt vom Backend.
    # Kein React-Bundle nötig — der Nutzer scannt den QR auf dem TV, landet hier.
    location /activate {
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $pf_backend backend;
        proxy_pass http://$pf_backend:8000/api/device/activate$is_args$args;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── MCP-Server (NimtaFlow als MCP für Claude/ChatGPT) ──
    # OAuth-Discovery (.well-known), Authorize/Token/Register, Consent und der
    # Streamable-HTTP-Endpoint laufen über DIESELBE HTTPS-Domain wie die App, damit
    # der Ein-Klick-OAuth-Connector ohne eigene Subdomain funktioniert.
    # Connector-URL: https://<host>/mcp
    location ~ ^/(mcp(/|$)|authorize|token|register|oauth/|\.well-known/oauth-) {
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $pf_mcp mcp;
        proxy_pass http://$pf_mcp:8000$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_buffering off;          # SSE/streamable HTTP darf nicht gepuffert werden
        proxy_read_timeout 600s;
    }

    # Hashed build assets are immutable → cache hard.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # SPA shell (index.html + all client routes) must NOT be cached, so a new
    # deploy's asset hashes are picked up immediately instead of the browser
    # showing a stale frontend until a manual hard-reload.
    location / {
        add_header Cache-Control "no-cache, must-revalidate";
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
}
