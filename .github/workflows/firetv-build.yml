name: FireTV APK Build

on:
  push:
    paths:
      - 'firetv-app/**'
  workflow_dispatch:   # Manueller Auslöser per Knopfdruck auf GitHub

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # softprops/action-gh-release braucht write um Tags/Releases zu erstellen

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Java 17 einrichten
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Android SDK einrichten
        uses: android-actions/setup-android@v3

      - name: SDK-Komponenten installieren
        run: |
          sdkmanager --install \
            "platforms;android-35" \
            "build-tools;35.0.0" \
            "platform-tools"
          yes | sdkmanager --licenses

      - name: APK bauen
        working-directory: firetv-app
        run: ./gradlew assembleDebug

      - name: APK als CI-Artifact hochladen
        uses: actions/upload-artifact@v4
        with:
          name: nimtaflow-tv
          path: firetv-app/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # Erstellt / überschreibt den Tag 'firetv-latest' mit der frisch gebauten APK.
      # Server-Instanzen können damit täglich per GitHub API prüfen ob ein Update vorliegt.
      - name: Release 'firetv-latest' aktualisieren
        uses: softprops/action-gh-release@v2
        with:
          tag_name: firetv-latest
          name: "FireTV App — latest build"
          body: |
            Automatisch gebaut von GitHub Actions.
            Commit: ${{ github.sha }}
          prerelease: true
          files: firetv-app/app/build/outputs/apk/debug/app-debug.apk
          token: ${{ secrets.GITHUB_TOKEN }}
