name: FireTV APK Build

on:
  push:
    paths:
      - 'firetv-app/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Java 17 einrichten
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Android SDK Lizenzen akzeptieren
        run: yes | sdkmanager --licenses || true
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk

      - name: Keystore dekodieren (wenn Secret vorhanden)
        env:
          KEYSTORE_B64: ${{ secrets.FIRETV_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_B64" ]; then
            echo "$KEYSTORE_B64" | base64 -d > firetv-app/nimtaflow-firetv.jks
            echo "HAS_KEYSTORE=true" >> $GITHUB_ENV
          else
            echo "HAS_KEYSTORE=false" >> $GITHUB_ENV
          fi

      - name: APK bauen
        working-directory: firetv-app
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
          SIGNING_KEY_ALIAS: ${{ secrets.FIRETV_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.FIRETV_KEY_PASSWORD }}
          SIGNING_STORE_FILE: nimtaflow-firetv.jks
          SIGNING_STORE_PASSWORD: ${{ secrets.FIRETV_STORE_PASSWORD }}
        run: |
          chmod +x gradlew
          if [ "$HAS_KEYSTORE" = "true" ]; then
            ./gradlew assembleRelease --no-daemon --stacktrace
          else
            ./gradlew assembleDebug --no-daemon --stacktrace
          fi

      - name: APK-Pfad ermitteln
        id: apk
        run: |
          if [ -f "firetv-app/app/build/outputs/apk/release/app-release.apk" ]; then
            echo "path=firetv-app/app/build/outputs/apk/release/app-release.apk" >> $GITHUB_OUTPUT
            echo "label=nimtaflow-tv-release" >> $GITHUB_OUTPUT
          else
            echo "path=firetv-app/app/build/outputs/apk/debug/app-debug.apk" >> $GITHUB_OUTPUT
            echo "label=nimtaflow-tv-debug" >> $GITHUB_OUTPUT
          fi

      - name: APK als CI-Artifact hochladen
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.apk.outputs.label }}
          path: ${{ steps.apk.outputs.path }}
          retention-days: 30

      - name: Release 'firetv-latest' aktualisieren
        uses: softprops/action-gh-release@v2
        with:
          tag_name: firetv-latest
          name: "FireTV App — latest build"
          body: |
            Automatisch gebaut von GitHub Actions.
            Commit: ${{ github.sha }}
          prerelease: true
          files: ${{ steps.apk.outputs.path }}
          token: ${{ secrets.GITHUB_TOKEN }}
