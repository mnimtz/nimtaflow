name: FireTV APK Build

on:
  push:
    paths:
      - 'firetv-app/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # Für softprops/action-gh-release (Tag + Release erstellen)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Java 17 einrichten
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Android SDK Lizenzen akzeptieren
        run: yes | sdkmanager --licenses || true
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk

      - name: APK bauen
        working-directory: firetv-app
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk

      - name: APK als CI-Artifact hochladen
        uses: actions/upload-artifact@v4
        with:
          name: nimtaflow-tv
          path: firetv-app/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Release 'firetv-latest' aktualisieren
        uses: softprops/action-gh-release@v2
        with:
          tag_name: firetv-latest
          name: "FireTV App — latest build"
          body: |
            Automatisch gebaut von GitHub Actions.
            Commit: ${{ github.sha }}
          prerelease: true
          files: firetv-app/app/build/outputs/apk/debug/app-debug.apk
          token: ${{ secrets.GITHUB_TOKEN }}
