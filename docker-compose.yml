services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    volumes:
      - photoflow-db:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: photoflow
      POSTGRES_USER: photoflow
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U photoflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    image: photoflow-app:latest
    restart: unless-stopped
    volumes:
      - ${PHOTOS_PATH:-/mnt/media-8tb/Fotos}:/photos:rw
      - /mnt:/mnt:ro
      - photoflow-cache:/cache
      - photoflow-config:/config
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://photoflow:${DB_PASSWORD}@db/photoflow
      REDIS_URL: redis://redis:6379
      SECRET_KEY: ${SECRET_KEY}
      CACHE_PATH: /cache
      CONFIG_PATH: /config
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      TZ: ${TZ:-Europe/Berlin}

  worker:
    build: ./backend
    image: photoflow-app:latest
    # GPU work serializes through one model copy: a single 8 GB card can hold
    # exactly one 3B VLM. Prefork with >1 worker would load N copies → OOM
    # (SIGKILL). Keep concurrency at 1 and consume ONLY the gpu queue (AI +
    # face detection). Scans/thumbnails run on worker-cpu so they never wait.
    command: ["celery", "-A", "app.worker.celery_app", "worker", "-Q", "gpu", "--loglevel=${LOG_LEVEL:-info}", "-c", "${WORKER_CONCURRENCY:-1}"]
    restart: unless-stopped
    runtime: nvidia          # GPU (RTX 2080) for the AI/face workers
    volumes:
      - ${PHOTOS_PATH:-/mnt/media-8tb/Fotos}:/photos:rw
      - photoflow-cache:/cache
      - photoflow-config:/config
      - photoflow-models:/models
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://photoflow:${DB_PASSWORD}@db/photoflow
      REDIS_URL: redis://redis:6379
      SECRET_KEY: ${SECRET_KEY}
      CACHE_PATH: /cache
      CONFIG_PATH: /config
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      TZ: ${TZ:-Europe/Berlin}
      # Persistent model cache (HuggingFace) so downloads survive rebuilds
      HF_HOME: /models
      HF_HUB_CACHE: /models/hub
      TRANSFORMERS_CACHE: /models/hub
      TORCH_HOME: /models/torch
      INSIGHTFACE_HOME: /models/insightface
      # Cap CPU threads so onnxruntime/torch don't try to pin to host cores the
      # LXC can't use (the pthread_setaffinity errors) and thrash the CPU.
      OMP_NUM_THREADS: "4"
      OPENBLAS_NUM_THREADS: "4"
      MKL_NUM_THREADS: "4"
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility

  # CPU worker: scanning, thumbnails, clustering, metadata. No GPU, runs in
  # parallel (concurrency 4) so a long AI backlog on the gpu worker never stalls
  # folder scans or thumbnail generation. Also drains the default "celery" queue.
  worker-cpu:
    build: ./backend
    image: photoflow-app:latest
    command: ["celery", "-A", "app.worker.celery_app", "worker", "-Q", "cpu,celery", "--loglevel=${LOG_LEVEL:-info}", "-c", "${CPU_WORKER_CONCURRENCY:-4}"]
    restart: unless-stopped
    volumes:
      - ${PHOTOS_PATH:-/mnt/media-8tb/Fotos}:/photos:rw
      - /mnt:/mnt:ro
      - photoflow-cache:/cache
      - photoflow-config:/config
      - photoflow-models:/models
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://photoflow:${DB_PASSWORD}@db/photoflow
      REDIS_URL: redis://redis:6379
      SECRET_KEY: ${SECRET_KEY}
      CACHE_PATH: /cache
      CONFIG_PATH: /config
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      TZ: ${TZ:-Europe/Berlin}
      HF_HOME: /models
      HF_HUB_CACHE: /models/hub
      TRANSFORMERS_CACHE: /models/hub
      TORCH_HOME: /models/torch
      INSIGHTFACE_HOME: /models/insightface
      OMP_NUM_THREADS: "4"
      OPENBLAS_NUM_THREADS: "4"
      MKL_NUM_THREADS: "4"

  beat:
    build: ./backend
    image: photoflow-app:latest
    command: ["celery", "-A", "app.worker.celery_app", "beat", "--loglevel=${LOG_LEVEL:-info}"]
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://photoflow:${DB_PASSWORD}@db/photoflow
      REDIS_URL: redis://redis:6379
      SECRET_KEY: ${SECRET_KEY}
      CACHE_PATH: /cache
      CONFIG_PATH: /config
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      TZ: ${TZ:-Europe/Berlin}

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "${PORT:-8090}:80"
    depends_on:
      - backend
    environment:
      VITE_API_URL: /api

volumes:
  photoflow-db:
  photoflow-cache:
  photoflow-config:
  photoflow-models:
