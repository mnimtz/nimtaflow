name: NimtaFlowTV
options:
  bundleIdPrefix: email.nimtz.nimtaflow
  createIntermediateGroups: true
  xcodeVersion: "16.0"
  deploymentTarget:
    tvOS: "16.0"

settings:
  base:
    SWIFT_VERSION: 5
    ENABLE_PREVIEWS: "YES"

targets:
  NimtaFlowTV:
    type: application
    platform: tvOS
    deploymentTarget: "16.0"
    sources:
      - path: NimtaFlowTV
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: email.nimtz.nimtaflow.tvos
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: 1
        TARGETED_DEVICE_FAMILY: "3"
        TVOS_DEPLOYMENT_TARGET: "16.0"
    info:
      path: NimtaFlowTV/Info.plist
      properties:
        CFBundleDisplayName: NimtaFlow
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        UIUserInterfaceStyle: Dark
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
